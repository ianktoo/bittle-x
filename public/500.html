<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 - Server Error</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      font-family: Nunito, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      background-color: #000000;
      background-image: radial-gradient(circle at 50% 0%, rgba(250, 204, 21, 0.15) 0%, transparent 40%);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      color: #ef4444;
      line-height: 1;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #cbd5e1;
      margin-bottom: 32px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #FACC15;
      color: #000000;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    a:hover {
      background: #f1c232;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">500</div>
    <h1>Server Error</h1>
    <p>Something went wrong on our end. Please try again later.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
